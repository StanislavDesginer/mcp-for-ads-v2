[mcp_servers.adforge]
command = "C:\\<project-path>\\AdForge-MCP\\.venv\\Scripts\\python.exe"
args = ["-m", "ad_mcp.server"]
cwd = "C:\\<project-path>\\AdForge-MCP"
startup_timeout_sec = 20.0
tool_timeout_sec = 120.0
enabled = true

[mcp_servers.adforge.tools.list_providers]
approval_mode = "approve"

[mcp_servers.adforge.tools.list_accounts]
approval_mode = "approve"

[mcp_servers.adforge.tools.get_account_summary]
approval_mode = "approve"

[mcp_servers.adforge.tools.get_billing_summary]
approval_mode = "approve"
